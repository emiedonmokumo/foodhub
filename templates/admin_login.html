{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Admin Login</h2>
            <p class="text-gray-500 mt-2">Manage your Foodhub content</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            {% if error %}
            <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-4">
                <p class="text-red-700 text-sm">{{ error }}</p>
            </div>
            {% endif %}

            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" id="username" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none"
                    placeholder="Enter admin username">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" id="password" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none"
                    placeholder="••••••••">
            </div>

            <div>
                <button type="submit"
                    class="w-full bg-gray-900 text-white font-semibold py-3 px-4 rounded-xl hover:bg-gray-800 transform active:scale-[0.98] transition-all shadow-lg">
                    Sign In
                </button>
            </div>
        </form>

        <div class="mt-6 text-center">
            <a href="{% url 'landing_page' %}" class="text-sm text-gray-500 hover:text-gray-900 transition-colors">
                &lsaquo; Back to home
            </a>
        </div>
    </div>
</div>
{% endblock %}
