<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Foodhub{% endblock %}</title>
  {% load static %}
  <link rel="icon" type="image/svg+xml" href="{% static 'logo.svg' %}">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ request.build_absolute_uri }}">
  <meta property="og:title" content="{% block og_title %}Foodhub - Discover the Art of Cooking{% endblock %}">
  <meta property="og:description"
    content="{% block og_description %}Explore premium recipes, culinary tips, and food culture from around the world.{% endblock %}">
  <meta property="og:image"
    content="{% block og_image %}{% static 'foodhub_hero_image_1772703314503.png' %}{% endblock %}">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="{{ request.build_absolute_uri }}">
  <meta property="twitter:title" content="{% block twitter_title %}Foodhub - Discover the Art of Cooking{% endblock %}">
  <meta property="twitter:description"
    content="{% block twitter_description %}Explore premium recipes, culinary tips, and food culture from around the world.{% endblock %}">
  <meta property="twitter:image"
    content="{% block twitter_image %}{% static 'foodhub_hero_image_1772703314503.png' %}{% endblock %}">

  {% block extra_head %}{% endblock %}
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800">
  <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto py-4 px-6 flex justify-between items-center">
      <a href="{% url 'landing_page' %}" class="text-2xl font-bold text-gray-900 flex items-center gap-3">
        <img src="{% static 'logo.svg' %}" alt="Foodhub Logo" class="w-10 h-10">
        Foodhub
      </a>
      <nav class="flex items-center gap-6">
        {% if user.is_authenticated %}
        <a href="{% url 'post_list' %}"
          class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Dashboard</a>
        <a href="{% url 'admin_logout' %}"
          class="inline-flex items-center px-4 py-2 border border-gray-200 rounded-xl text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-all shadow-sm">
          Sign Out
        </a>
        {% else %}
        <a href="{% url 'landing_page' %}"
          class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Home</a>
        <a href="{% url 'admin_login' %}"
          class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Admin Login</a>
        {% endif %}
      </nav>
    </div>
  </header>
  <main class="max-w-4xl mx-auto p-4">
    {% block content %}{% endblock %}
  </main>
  <footer class="max-w-4xl mx-auto p-4 text-sm text-gray-500">
    &copy; Foodhub
  </footer>
</body>

</html>
