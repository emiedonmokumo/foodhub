{% extends 'base.html' %}

{% block content %}
<div class="bg-white p-6 rounded shadow">
  <h2 class="text-xl font-bold mb-4">{% if object %}Edit{% else %}New{% endif %} Post</h2>
  <form method="post">
    {% csrf_token %}
    <div class="space-y-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Title</label>
        {{ form.title }}
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Slug (Optional)</label>
        {{ form.slug }}
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Content</label>
        {{ form.content }}
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Featured Image URL</label>
        {{ form.featured_image }}
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Published Date</label>
        {{ form.published_date }}
      </div>
    </div>
    <div class="mt-8 flex items-center gap-4">
      <button type="submit"
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-xl transition-all shadow-md active:scale-95">
        Save Post
      </button>
      <a href="{% url 'post_list' %}" class="text-gray-500 hover:text-gray-900 font-medium transition-colors">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
