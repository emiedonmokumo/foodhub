{% extends 'base.html' %}

{% block content %}
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">Posts</h2>
    <a href="{% url 'post_add' %}" class="bg-blue-600 text-white px-3 py-1 rounded">New Post</a>
  </div>
  <div class="space-y-4">
    {% for post in posts %}
      <article class="bg-white p-4 rounded shadow">
        <h3 class="text-lg font-semibold"><a href="{% url 'post_detail' post_id=post.id %}">{{ post.title }}</a></h3>
        <p class="text-sm text-gray-600">{{ post.published_date }}</p>
        <p class="mt-2 text-gray-700">{{ post.content|truncatechars:200 }}</p>
        <div class="mt-3">
          <a href="{% url 'post_edit' post_id=post.id %}" class="text-indigo-600">Edit</a>
          <a href="{% url 'post_delete' post_id=post.id %}" class="text-red-600 ml-4">Delete</a>
        </div>
      </article>
    {% empty %}
      <p>No posts yet.</p>
    {% endfor %}
  </div>
{% endblock %}
